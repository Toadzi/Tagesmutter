# Nginx-Konfiguration für Unterverzeichnis-Installation
# Beispiel: https://example.com/tagesmutter/
#
# In die server{}-Block deines virtuellen Hosts einfügen.
# APP_BASE_PATH in config.php muss auf '/tagesmutter' gesetzt sein.

location /tagesmutter/ {
    alias /var/www/tagesmutter/public/;
    try_files $uri /tagesmutter/index.php$is_args$args;
}

location ~ ^/tagesmutter/index\.php(/|$) {
    fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    fastcgi_split_path_info ^(.+\.php)(/.*)$;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /var/www/tagesmutter/public/index.php;
    fastcgi_param DOCUMENT_ROOT   /var/www/tagesmutter/public;
}
