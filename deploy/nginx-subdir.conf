# Nginx-Konfiguration für Unterverzeichnis-Installation
# Beispiel: https://example.com/ministep/
#
# In die server{}-Block deines virtuellen Hosts einfügen.
# APP_BASE_PATH in config.php muss auf '/ministep' gesetzt sein.

location /ministep/ {
    alias /var/www/ministep/public/;
    try_files $uri /ministep/index.php$is_args$args;
}

location ~ ^/ministep/index\.php(/|$) {
    fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    fastcgi_split_path_info ^(.+\.php)(/.*)$;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /var/www/ministep/public/index.php;
    fastcgi_param DOCUMENT_ROOT   /var/www/ministep/public;
}
