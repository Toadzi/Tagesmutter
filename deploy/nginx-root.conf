# Nginx-Konfiguration für Root-Installation
# Beispiel: https://example.com/
#
# APP_BASE_PATH in config.php muss leer ('') sein.

server {
    listen 80;
    server_name example.com;
    root /var/www/tagesmutter/public;
    index index.php;

    # Alle Anfragen durch index.php leiten
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Uploads und andere sensible Verzeichnisse schützen
    location ~* ^/(data|migrations|src|templates|vendor)/ {
        deny all;
        return 404;
    }
}
